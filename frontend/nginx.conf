server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any path that does not match a real file is served as
    # index.html so React Router can handle client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent browsers from caching the SPA entry point so that users always
    # get the latest build after a deployment
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Let browsers cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
