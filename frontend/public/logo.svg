<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Brain outline (top arc) -->
  <path d="M20 30 Q18 20 26 17 Q30 14 32 17 Q34 14 38 17 Q46 20 44 30" 
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Brain lower body -->
  <path d="M20 30 Q19 38 24 40 Q28 42 32 40 Q36 42 40 40 Q45 38 44 30"
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Brain center crease -->
  <line x1="32" y1="17" x2="32" y2="40" stroke="white" stroke-width="1.4" stroke-dasharray="2,2"/>

  <!-- Left brain fold -->
  <path d="M23 24 Q21 28 23 32" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right brain fold -->
  <path d="M41 24 Q43 28 41 32" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Circuit nodes at bottom -->
  <circle cx="24" cy="50" r="2.5" fill="url(#accent)"/>
  <circle cx="32" cy="50" r="2.5" fill="url(#accent)"/>
  <circle cx="40" cy="50" r="2.5" fill="url(#accent)"/>

  <!-- Connecting lines from brain to nodes -->
  <line x1="24" y1="40" x2="24" y2="47.5" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="32" y1="40" x2="32" y2="47.5" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="47.5" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Horizontal connector between nodes -->
  <line x1="24" y1="50" x2="40" y2="50" stroke="#06B6D4" stroke-width="1.5"/>
</svg>
